[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '/(\.venv|chroma_db|node_modules)/'

[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = [".venv", "chroma_db", "node_modules", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
